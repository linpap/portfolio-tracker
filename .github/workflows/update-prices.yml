name: Update Stock Prices

on:
  schedule:
    - cron: '30 4 * * 1-5'  # 4:30 UTC = 10:00 AM IST, weekdays only
  workflow_dispatch:          # manual trigger

permissions:
  contents: write

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch live prices
        run: node scripts/fetch-prices.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet && echo "No price changes" && exit 0
          git commit -m "prices: $(date -u +%Y-%m-%d)"
          git push
